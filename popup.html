<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>malpa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      width: 360px;
      background: #0f0f0f;
      color: #e8e8e8;
    }

    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }

    header a {
      font-size: 12px;
      color: #888;
      text-decoration: none;
    }
    header a:hover { color: #bbb; }

    .main { padding: 14px 16px; }

    textarea {
      width: 100%;
      height: 90px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 10px;
      resize: none;
      outline: none;
      line-height: 1.5;
    }
    textarea:focus { border-color: #555; }
    textarea::placeholder { color: #555; }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 9px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #1d4ed8; }
    button:disabled { background: #1e3a6a; color: #6b8aad; cursor: not-allowed; }

    #status {
      display: none;
      margin-top: 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 8px 10px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 12px;
      color: #aaa;
      line-height: 1.6;
    }

    #status.visible { display: block; }

    .status-line { margin-bottom: 2px; }
    .status-line.success { color: #4ade80; }
    .status-line.error { color: #f87171; }

    #url-badge {
      margin-top: 8px;
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <header>
    <h1>malpa</h1>
    <a id="dashboard-link" href="#">Dashboard</a>
  </header>
  <div class="main">
    <textarea id="prompt" placeholder="Describe what you want to change on this page…"></textarea>
    <button id="generate-btn">Generate Script</button>
    <div id="status"></div>
    <div id="url-badge"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>malpa — Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
    }

    header {
      padding: 20px 32px 0;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }

    .tabs {
      display: flex;
      gap: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #666;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
    }
    .tab-btn:hover { color: #bbb; }
    .tab-btn.active {
      color: #fff;
      border-bottom-color: #2563eb;
    }

    .tab-panel { display: none; padding: 24px 32px; }
    .tab-panel.active { display: block; }

    /* ── Scripts tab ── */
    .scripts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .scripts-header h2 { font-size: 15px; color: #bbb; font-weight: 500; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      color: #666;
      font-weight: 500;
      border-bottom: 1px solid #222;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #1a1a1a;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #141414; }

    .name-cell { color: #e8e8e8; font-weight: 500; }
    .match-cell { color: #888; font-family: monospace; font-size: 12px; }
    .date-cell { color: #666; font-size: 12px; white-space: nowrap; }

    /* Toggle switch */
    .toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #333;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    input:checked + .slider { background: #1e3a6a; }
    input:checked + .slider:before { transform: translateX(16px); background: #2563eb; }

    /* Action buttons */
    .actions { display: flex; gap: 6px; }
    .btn-sm {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 5px;
      color: #aaa;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-sm:hover { background: #222; color: #e8e8e8; }
    .btn-sm.danger:hover { background: #3b1111; color: #f87171; border-color: #5c1f1f; }

    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: #444;
    }
    .empty-state p { margin-top: 8px; font-size: 13px; }

    /* ── Edit panel ── */
    .edit-panel {
      margin-top: 12px;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px;
    }

    .edit-panel h3 { font-size: 13px; color: #bbb; margin-bottom: 10px; }

    .edit-panel pre {
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 5px;
      padding: 10px;
      font-size: 12px;
      color: #777;
      max-height: 120px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 10px;
    }

    .edit-panel textarea {
      width: 100%;
      height: 64px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 5px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 8px;
      resize: none;
      outline: none;
    }
    .edit-panel textarea:focus { border-color: #555; }

    .edit-panel-actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn-primary {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #1e3a6a; color: #6b8aad; cursor: not-allowed; }
    .btn-cancel {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 5px;
      color: #888;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
    }
    .btn-cancel:hover { background: #222; color: #bbb; }

    .edit-status { font-size: 12px; color: #888; margin-top: 6px; }
    .edit-status.success { color: #4ade80; }
    .edit-status.error { color: #f87171; }

    /* ── Logs tab ── */
    .log-filters {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .log-filters input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
    }
    .log-filters input:focus { border-color: #555; }

    .result-ok { color: #4ade80; }
    .result-err { color: #f87171; font-size: 11px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 20px;
      max-width: 700px;
      width: 90vw;
      max-height: 80vh;
      overflow: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .modal-header h3 { font-size: 14px; color: #e8e8e8; }
    .modal-close {
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
    }
    .modal-close:hover { color: #bbb; }
    .modal pre {
      font-size: 12px;
      color: #aaa;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 5px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <header>
    <h1>malpa</h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="scripts">Scripts</button>
      <button class="tab-btn" data-tab="logs">Logs</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </div>
  </header>

  <!-- Scripts tab -->
  <div class="tab-panel active" id="tab-scripts">
    <div class="scripts-header">
      <h2 id="scripts-count">Loading…</h2>
    </div>

    <div id="scripts-empty" class="empty-state" style="display:none;">
      <div style="font-size:32px">🐒</div>
      <p>No scripts yet. Use the popup to generate your first script.</p>
    </div>

    <table id="scripts-table" style="display:none;">
      <thead>
        <tr>
          <th>Name</th>
          <th>Match Pattern</th>
          <th>Status</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="scripts-body"></tbody>
    </table>

    <div id="edit-panels"></div>
  </div>

  <!-- Logs tab -->
  <div class="tab-panel" id="tab-logs">
    <div class="log-filters">
      <input type="text" id="log-filter-name" placeholder="Filter by script name…">
      <input type="text" id="log-filter-url" placeholder="Filter by URL…">
    </div>
    <div id="logs-empty" class="empty-state" style="display:none;">
      <p>No execution logs yet.</p>
    </div>
    <table id="logs-table" style="display:none;">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Script Name</th>
          <th>URL</th>
          <th>Result</th>
        </tr>
      </thead>
      <tbody id="logs-body"></tbody>
    </table>
  </div>

  <!-- Settings tab -->
  <div class="tab-panel" id="tab-settings">
    <p style="color:#666; font-size:13px; margin-bottom:16px;">
      Configure your API key and model preferences.
    </p>
    <a href="settings.html" target="_blank" style="color:#2563eb; font-size:13px;">
      Open Settings Page →
    </a>
  </div>

  <!-- Code viewer modal -->
  <div class="modal-overlay" id="code-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Script Code</h3>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <pre id="modal-code"></pre>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
